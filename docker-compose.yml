services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_USER: baridi
      POSTGRES_PASSWORD: baridi
      POSTGRES_DB: baridi_ma
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baridi"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://baridi:baridi@postgres:5432/baridi_ma
      PORT: 4001
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy

  shipment-service:
    build:
      context: .
      dockerfile: services/shipment/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://baridi:baridi@postgres:5432/baridi_ma
      PORT: 4002
      AUTH_SERVICE_URL: http://auth-service:4001
      INGESTION_SERVICE_URL: http://ingestion-service:4003
      ALERTING_SERVICE_URL: http://alerting-service:4004
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    # Not depends_on: ingestion-service / alerting-service — that would create
    # a startup cycle (ingestion-service depends on shipment-service for device
    # validation). Readings/alerts proxying tolerates the other service not
    # being up yet (telemetry-client.ts returns [] on a failed fetch).

  ingestion-service:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://baridi:baridi@postgres:5432/baridi_ma
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      SHIPMENT_SERVICE_URL: http://shipment-service:4002
      PORT: 4003
    ports:
      - "4003:4003"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
      shipment-service:
        condition: service_started

  alerting-service:
    build:
      context: .
      dockerfile: services/alerting/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://baridi:baridi@postgres:5432/baridi_ma
      PORT: 4004
    ports:
      - "4004:4004"
    depends_on:
      postgres:
        condition: service_healthy

  # S3-compatible local emulator (post-MVP architecture note: "S3 (post-MVP)").
  # Compliance Service talks to it via the AWS S3 SDK — pointing that same SDK
  # at real AWS S3 in another environment is an env-var change only, no code change.
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: baridi-minio
      MINIO_ROOT_PASSWORD: baridi-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: creates the compliance bucket, then exits. compliance-service
  # waits on this completing rather than just on minio being up, since a
  # healthy MinIO server doesn't imply the bucket exists yet.
  minio-init:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 baridi-minio baridi-minio-secret &&
      mc mb --ignore-existing local/baridi-compliance
      "

  compliance-service:
    build:
      context: .
      dockerfile: services/compliance/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://baridi:baridi@postgres:5432/baridi_ma
      PORT: 4005
      SHIPMENT_SERVICE_URL: http://shipment-service:4002
      INGESTION_SERVICE_URL: http://ingestion-service:4003
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: baridi-compliance
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: baridi-minio
      S3_SECRET_ACCESS_KEY: baridi-minio-secret
    ports:
      - "4005:4005"
    depends_on:
      postgres:
        condition: service_healthy
      shipment-service:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    # Not depends_on: ingestion-service — export tolerates it not being up yet
    # (fetchDeviceReadings returns [] on a failed fetch, same as shipment-service's
    # telemetry-client.ts pattern); a shipment can't reach "delivered" without
    # ingestion having been up at some point anyway.

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      AUTH_SERVICE_URL: http://auth-service:4001
      SHIPMENT_SERVICE_URL: http://shipment-service:4002
      COMPLIANCE_SERVICE_URL: http://compliance-service:4005
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - shipment-service
      - alerting-service
      - compliance-service

  # Opt-in only (profile "simulator") — needs a real device token from an
  # already-created shipment, which doesn't exist on a fresh `docker compose up`.
  # Run with: docker compose --profile simulator run --rm -e SIMULATOR_DEVICE_TOKEN=<token> sensor-simulator
  sensor-simulator:
    profiles: ["simulator"]
    build:
      context: .
      dockerfile: simulator/Dockerfile
    environment:
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on:
      - mosquitto

volumes:
  postgres_data:
  minio_data:
