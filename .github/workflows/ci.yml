name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      # Coverage thresholds (80% per CLAUDE.md rule 6) are enforced per-workspace
      # by each vitest.config.ts — this fails the job if any drop below the gate.
      # Integration tests use Testcontainers, which needs the Docker daemon
      # already present on GitHub-hosted ubuntu-latest runners.
      - run: npm run test:coverage --workspaces --if-present

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep (SAST)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten
      - name: Trivy (SCA — dependency CVEs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Gitleaks (secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [lint, test, security-scan]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: web, context: apps/web }
          - { name: auth-service, context: services/auth }
          - { name: shipment-service, context: services/shipment }
          - { name: ingestion-service, context: services/ingestion }
          - { name: alerting-service, context: services/alerting }
          - { name: compliance-service, context: services/compliance }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.context }}/Dockerfile
          push: false
          tags: baridi-ma/${{ matrix.service.name }}:ci
