name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  deploy-staging:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, baridi-ma]
    environment: staging
    defaults:
      run:
        # Explicit path: "bash" on this runner's PATH resolves to Windows' built-in
        # WSL bash stub (no distro installed) before Git Bash, since System32
        # precedes Git in system PATH order.
        shell: 'C:\Program Files\Git\bin\bash.exe -e {0}'
    steps:
      # clean:false preserves the runner-local .env (never committed, seeded once by
      # hand on this host per docs/devops-baridi-ma.md Sec 3) across checkouts.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          clean: false
      - name: Rebuild and restart stack
        run: docker compose up -d --build
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://baridi:baridi@localhost:5433/baridi_ma
        run: |
          npm ci
          npm run migrate

  deploy-prod:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, baridi-ma]
    environment: production
    defaults:
      run:
        # Explicit path: "bash" on this runner's PATH resolves to Windows' built-in
        # WSL bash stub (no distro installed) before Git Bash, since System32
        # precedes Git in system PATH order.
        shell: 'C:\Program Files\Git\bin\bash.exe -e {0}'
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - name: Rebuild and restart stack
        run: docker compose up -d --build
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://baridi:baridi@localhost:5433/baridi_ma
        run: |
          npm ci
          npm run migrate
