name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  deploy-staging:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, baridi-ma]
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Rebuild and restart stack
        run: docker compose up -d --build
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://baridi:baridi@localhost:5433/baridi_ma
        run: npm run migrate

  deploy-prod:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, baridi-ma]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild and restart stack
        run: docker compose up -d --build
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://baridi:baridi@localhost:5433/baridi_ma
        run: npm run migrate
